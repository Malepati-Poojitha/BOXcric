{% extends "base.html" %}
{% block title %}BOXcric — Live Scoring{% endblock %}

{% block content %}
<div id="scoringApp">
  <div class="loading-center"><div class="spinner"></div></div>
</div>

<!-- Wicket Modal -->
<div class="modal-backdrop" id="wicketModal">
  <div class="modal">
    <div class="modal-header">
      <h3>🔴 Wicket!</h3>
      <button class="modal-close" onclick="closeWicketModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Wicket Type</label>
        <div class="wicket-type-grid" id="wicketTypeGrid">
          <button class="wicket-type-btn" data-type="bowled" onclick="selectWicketType(this)">Bowled</button>
          <button class="wicket-type-btn" data-type="caught" onclick="selectWicketType(this)">Caught</button>
          <button class="wicket-type-btn" data-type="lbw" onclick="selectWicketType(this)">LBW</button>
          <button class="wicket-type-btn" data-type="run_out" onclick="selectWicketType(this)">Run Out</button>
          <button class="wicket-type-btn" data-type="stumped" onclick="selectWicketType(this)">Stumped</button>
          <button class="wicket-type-btn" data-type="hit_wicket" onclick="selectWicketType(this)">Hit Wicket</button>
          <button class="wicket-type-btn" data-type="retired" onclick="selectWicketType(this)">Retired</button>
        </div>
      </div>
      <div class="form-group">
        <label>Dismissed Batsman</label>
        <select id="dismissedPlayer" class="form-control"></select>
      </div>
      <div class="form-group" id="fielderGroup">
        <label>Fielder / Catcher</label>
        <select id="fielderPlayer" class="form-control"><option value="">— None —</option></select>
      </div>
      <div class="form-group">
        <label>Runs scored on this ball</label>
        <select id="wicketRuns">
          <option value="0">0</option><option value="1">1</option>
          <option value="2">2</option><option value="3">3</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeWicketModal()">Cancel</button>
      <button class="btn btn-accent" onclick="confirmWicket()">Confirm Wicket</button>
    </div>
  </div>
</div>

<!-- Change Batter Modal -->
<div class="modal-backdrop" id="newBatterModal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Batsman</h3>
      <button class="modal-close" onclick="el('newBatterModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Select New Batsman</label>
        <select id="newBatterSelect"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="confirmNewBatter()">Send to Crease</button>
    </div>
  </div>
</div>

<!-- Change Bowler Modal (end of over) -->
<div class="modal-backdrop" id="changeBowlerModal">
  <div class="modal">
    <div class="modal-header">
      <h3>🔄 New Over — Select Bowler</h3>
      <button class="modal-close" onclick="el('changeBowlerModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="text-center mb-2">
        <p class="text-sm text-muted">Over completed. Select next bowler.</p>
        <p class="text-sm" style="color:var(--accent)" id="prevBowlerNote"></p>
      </div>
      <div class="form-group">
        <label>Next Over Bowler *</label>
        <select id="newBowlerSelect" style="font-size:16px;padding:10px"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-lg btn-block" onclick="confirmNewBowler()">Start Next Over</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const MATCH_ID = {{ match_id }};
let matchData = null;
let teamsMap = {};
let allPlayers = [];
let currentInnings = null;
let striker = null;
let nonStriker = null;
let currentBowler = null;
let selectedWicketType = 'bowled';
let recentBalls = [];
let dismissedBatters = new Set(); // track who is out
let pendingCorrection = false; // true after undo, next ball is a correction

// Batting team players for this innings
let battingPlayers = [];
let bowlingPlayers = [];

document.addEventListener('DOMContentLoaded', async () => {
  const [teams, players] = await Promise.all([api('/teams/'), api('/players/')]);
  teams.forEach(t => teamsMap[t.id] = t);
  allPlayers = players;
  matchData = await api(`/matches/${MATCH_ID}`);

  if (!matchData || (matchData.status !== 'live' && matchData.status !== 'innings_break')) {
    var backUrl = (window.location.pathname.indexOf('/app/') === 0) ? '/app/match/' + MATCH_ID : '/admin/match/' + MATCH_ID;
    el('scoringApp').innerHTML = emptyState('⚠️', 'Match is not live', '<a href="' + backUrl + '" class="btn btn-primary mt-2">Go to Match</a>');
    return;
  }

  // Find active innings
  currentInnings = matchData.innings.find(i => !i.is_completed);
  if (!currentInnings) {
    // Check if 1st innings done, switch to 2nd
    const inn2 = matchData.innings.find(i => i.innings_number === 2);
    if (inn2 && !inn2.is_completed) currentInnings = inn2;
    else {
      var backUrl2 = (window.location.pathname.indexOf('/app/') === 0) ? '/app/match/' + MATCH_ID : '/admin/match/' + MATCH_ID;
      el('scoringApp').innerHTML = emptyState('✅', 'Both innings complete', '<a href="' + backUrl2 + '" class="btn btn-primary mt-2">View Result</a>');
      return;
    }
  }

  const battingTeam = teamsMap[currentInnings.batting_team_id];
  const bowlingTeam = teamsMap[currentInnings.bowling_team_id];
  battingPlayers = battingTeam ? battingTeam.players : [];
  bowlingPlayers = bowlingTeam ? bowlingTeam.players : [];

  // Restore saved selections from localStorage
  var saveKey = 'boxcric_scoring_' + MATCH_ID + '_' + currentInnings.id;
  try {
    var saved = JSON.parse(localStorage.getItem(saveKey) || '{}');
    if (saved.striker) striker = saved.striker;
    if (saved.nonStriker) nonStriker = saved.nonStriker;
    if (saved.bowler) currentBowler = saved.bowler;
  } catch(e) {}

  // If no saved state, try to detect from last ball + load dismissed list
  try {
    var lb = await api('/scoring/innings/' + currentInnings.id + '/lastball');
    if (lb) {
      if (lb.striker && !striker) striker = lb.striker;
      if (lb.non_striker && !nonStriker) nonStriker = lb.non_striker;
      if (lb.bowler && !currentBowler) currentBowler = lb.bowler;
      // Load dismissed batters
      if (lb.dismissed && lb.dismissed.length) {
        lb.dismissed.forEach(function(pid) { dismissedBatters.add(pid); });
      }
    }
  } catch(e) {}

  renderScoringUI();

  // Auto-select dropdowns after render
  setTimeout(function() {
    if (striker && el('strikerSelect')) el('strikerSelect').value = striker;
    if (nonStriker && el('nonStrikerSelect')) el('nonStrikerSelect').value = nonStriker;
    if (currentBowler && el('bowlerSelect')) el('bowlerSelect').value = currentBowler;
  }, 100);
});

function renderScoringUI() {
  const inn = currentInnings;
  const batTeam = teamsMap[inn.batting_team_id] || {name:'Batting'};
  const bowlTeam = teamsMap[inn.bowling_team_id] || {name:'Bowling'};
  const innLabel = inn.innings_number <= 2 ? (inn.innings_number === 1 ? '1st' : '2nd') : 'Super Over ' + (inn.innings_number - 2);

  // Target info for 2nd innings
  let targetInfo = '';
  if (inn.innings_number >= 2) {
    const prevInn = matchData.innings.find(i => i.innings_number === inn.innings_number - 1);
    if (prevInn) {
      const target = prevInn.total_runs + 1;
      const need = target - inn.total_runs;
      targetInfo = `<div class="text-sm" style="color:#fbbf24;margin-top:4px">Target: ${target} | Need ${need > 0 ? need : 0} runs</div>`;
    }
  }

  let h = `
  <!-- Score Header -->
  <div class="live-hero" id="scoringHero" style="padding:16px 20px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;opacity:0.8">${batTeam.name} — ${innLabel}</div>
        <div id="heroScore" style="font-size:32px;font-weight:800;margin:4px 0">${inn.total_runs}/${inn.total_wickets} <span style="font-size:16px;opacity:0.7">(${inn.total_overs}.${inn.total_balls} ov)</span></div>
        ${targetInfo}
      </div>
      <div style="text-align:right">
        <div id="heroRR" style="font-size:13px;opacity:0.8">CRR: 0.00</div>
        <div id="heroRRR" style="font-size:13px;opacity:0.8;color:#fbbf24;display:none">RRR: 0.00</div>
        <div id="syncIndicator" style="font-size:10px;opacity:0;transition:opacity 0.2s;color:#fbbf24">saving...</div>
      </div>
    </div>
    <div id="recentBallsDisplay" style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap"></div>
  </div>

  <!-- Player Selection (collapsible) -->
  <div class="card mt-3" id="playerSelectionCard">
    <div class="card-header" style="cursor:pointer" onclick="togglePlayerPanel()">
      <span id="playerPanelTitle">👤 ${getPlayerName(striker) || 'Select Striker'} & ${getPlayerName(currentBowler) || 'Select Bowler'}</span>
      <span id="playerPanelToggle" style="float:right">▼</span>
    </div>
    <div class="card-body" id="playerPanel">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="margin-bottom:0">
          <label>🏏 Striker *</label>
          <select id="strikerSelect" onchange="striker=this.value?parseInt(this.value):null;saveSelections();updatePanelTitle()">
            <option value="">— Select —</option>
            ${battingPlayers.map(p => `<option value="${p.id}"${dismissedBatters.has(p.id) && p.id !== striker ? ' disabled' : ''}>${p.name}${dismissedBatters.has(p.id) ? ' (OUT)' : ''}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>🏃 Non-Striker</label>
          <select id="nonStrikerSelect" onchange="nonStriker=this.value?parseInt(this.value):null;saveSelections()">
            <option value="">— Select —</option>
            ${battingPlayers.map(p => `<option value="${p.id}"${dismissedBatters.has(p.id) && p.id !== nonStriker ? ' disabled' : ''}>${p.name}${dismissedBatters.has(p.id) ? ' (OUT)' : ''}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;margin-bottom:0">
        <label>⚾ Bowler *</label>
        <select id="bowlerSelect" onchange="currentBowler=this.value?parseInt(this.value):null;saveSelections();updatePanelTitle()">
          <option value="">— Select —</option>
          ${bowlingPlayers.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-outline btn-sm btn-block mt-3" onclick="swapStrike()">🔄 Swap Strike</button>
    </div>
  </div>

  <!-- Scoring Buttons -->
  <div class="card mt-3">
    <div class="card-body" style="padding:16px">
      <!-- Runs -->
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="run-btn" onclick="scoreBall(0)">0</button>
        <button class="run-btn" onclick="scoreBall(1)">1</button>
        <button class="run-btn" onclick="scoreBall(2)">2</button>
        <button class="run-btn" onclick="scoreBall(3)">3</button>
        <button class="run-btn four" onclick="scoreBall(4)">4</button>
        <button class="run-btn six" onclick="scoreBall(6)">6</button>
      </div>

      <!-- Extras -->
      <div style="display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap">
        <button class="extra-btn" onclick="scoreExtra('wide', 1)">Wd</button>
        <button class="extra-btn" onclick="scoreExtra('no_ball', 1)">NB</button>
        <button class="extra-btn" onclick="scoreExtra('bye', 1)">1B</button>
        <button class="extra-btn" onclick="scoreExtra('leg_bye', 1)">1LB</button>
        <button class="extra-btn" onclick="scoreExtra('wide', 2)">Wd+1</button>
        <button class="extra-btn" onclick="scoreExtra('no_ball', 2)">NB+1</button>
        <button class="extra-btn" onclick="scoreExtra('bye', 4)">4B</button>
      </div>

      <!-- Wicket -->
      <button class="wicket-btn mt-3" onclick="openWicketModal()">🔴 WICKET</button>
    </div>
  </div>

  <!-- Actions -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
    <button class="btn btn-outline btn-sm" onclick="undoLastBall()" style="color:var(--accent)">↩️ Undo</button>
    <button class="btn btn-outline btn-sm" onclick="endCurrentInnings()">⏭️ End Innings</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
    <button class="btn btn-outline btn-sm" onclick="switchInnings()">🔄 Switch Innings</button>
    <button class="btn btn-outline btn-sm" onclick="endMatchFromScore()">🏁 End Match</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
    <button class="btn btn-outline btn-sm" onclick="changeOvers()">🔢 Change Overs (${matchData.overs})</button>
    <a href="javascript:void(0)" onclick="window.location.href=(window.location.pathname.indexOf('/app/')===0?'/app/match/':'/admin/match/')+MATCH_ID" class="btn btn-outline btn-sm">📊 Scorecard</a>
  </div>
  `;

  el('scoringApp').innerHTML = h;

  // Auto-collapse player panel if all selected
  if (striker && currentBowler) {
    var panel = el('playerPanel');
    if (panel) panel.style.display = 'none';
    var toggle = el('playerPanelToggle');
    if (toggle) toggle.textContent = '▶';
  }
}

function getPlayerName(playerId) {
  if (!playerId) return null;
  for (var i = 0; i < allPlayers.length; i++) {
    if (allPlayers[i].id === playerId) return allPlayers[i].name;
  }
  return null;
}

function updatePanelTitle() {
  var title = el('playerPanelTitle');
  if (title) {
    title.textContent = '👤 ' + (getPlayerName(striker) || 'Select Striker') + ' & ' + (getPlayerName(currentBowler) || 'Select Bowler');
  }
}

function togglePlayerPanel() {
  var panel = el('playerPanel');
  var toggle = el('playerPanelToggle');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    toggle.textContent = '▼';
  } else {
    panel.style.display = 'none';
    toggle.textContent = '▶';
  }
}

function saveSelections() {
  var saveKey = 'boxcric_scoring_' + MATCH_ID + '_' + currentInnings.id;
  localStorage.setItem(saveKey, JSON.stringify({
    striker: striker,
    nonStriker: nonStriker,
    bowler: currentBowler
  }));
}

function validateSelection() {
  if (!striker) { toast('Select the striker!', 'error'); return false; }
  if (!currentBowler) { toast('Select the bowler!', 'error'); return false; }
  return true;
}

var pendingCalls = 0;
var scoringLocked = false;

function showSaving() {
  pendingCalls++;
  scoringLocked = true;
  var ind = el('syncIndicator');
  if (ind) { ind.textContent = '⏳ saving...'; ind.style.opacity = '1'; ind.style.color = '#fbbf24'; }
  // Disable all scoring buttons
  document.querySelectorAll('.run-btn, .extra-btn, .wicket-btn').forEach(function(b) {
    b.disabled = true;
    b.style.opacity = '0.5';
    b.style.pointerEvents = 'none';
  });
}
function hideSaving() {
  pendingCalls--;
  if (pendingCalls <= 0) {
    pendingCalls = 0;
    scoringLocked = false;
    var ind = el('syncIndicator');
    if (ind) { ind.textContent = '✓ saved'; ind.style.color = '#34d399'; }
    // Re-enable buttons
    document.querySelectorAll('.run-btn, .extra-btn, .wicket-btn').forEach(function(b) {
      b.disabled = false;
      b.style.opacity = '1';
      b.style.pointerEvents = 'auto';
    });
    setTimeout(function() {
      var ind2 = el('syncIndicator');
      if (ind2) { ind2.style.opacity = '0'; }
    }, 600);
  }
}

function scoreBall(runs) {
  if (scoringLocked) return;
  if (!validateSelection()) return;
  haptic(runs >= 4 ? 50 : 20);

  // Instant UI update
  var newRuns = currentInnings.total_runs + runs;
  var newBalls = currentInnings.total_balls + 1;
  var newOvers = currentInnings.total_overs;
  var overComplete = false;
  if (newBalls >= 6) { newOvers++; newBalls = 0; overComplete = true; }
  currentInnings.total_runs = newRuns;
  currentInnings.total_overs = newOvers;
  currentInnings.total_balls = newBalls;
  updateHeroInstant(newRuns, currentInnings.total_wickets, newOvers, newBalls);
  addRecentBall(runs, 'none', false);
  if (runs % 2 === 1) swapStrike();
  if (overComplete) {
    swapStrike();
    // Check if innings is done (all overs bowled)
    if (newOvers >= matchData.overs) {
      // Innings over - don't ask for bowler, auto-switch
      toast('Innings complete - all overs bowled', 'info');
      scoringLocked = true;
      showSaving();
    } else {
      promptBowlerChange();
    }
  }

  // Fire-and-forget API call — don't block UI
  var payload = {
    batter_id: striker,
    bowler_id: currentBowler,
    non_striker_id: nonStriker,
    runs_scored: runs,
    extra_type: 'none',
    extra_runs: 0,
    is_wicket: false,
    wicket_type: 'none',
    is_correction: pendingCorrection
  };
  pendingCorrection = false;
  showSaving();
  api('/scoring/innings/' + currentInnings.id + '/ball', 'POST', payload).then(function(ball) {
    hideSaving();
    if (!ball || ball.detail) {
      toast(ball && ball.detail ? ball.detail : 'Error recording ball', 'error');
    }
    bgSync();
  });
}

function scoreExtra(type, extraRuns) {
  if (scoringLocked) return;
  if (!validateSelection()) return;
  haptic(20);

  // Instant update
  currentInnings.total_runs += extraRuns;
  currentInnings.extras = (currentInnings.extras || 0) + extraRuns;
  updateHeroInstant(currentInnings.total_runs, currentInnings.total_wickets, currentInnings.total_overs, currentInnings.total_balls);
  addRecentBall(0, type, false, extraRuns);

  // Fire-and-forget
  var payload = {
    batter_id: striker,
    bowler_id: currentBowler,
    non_striker_id: nonStriker,
    runs_scored: 0,
    extra_type: type,
    extra_runs: extraRuns,
    is_wicket: false,
    wicket_type: 'none',
    is_correction: pendingCorrection
  };
  pendingCorrection = false;
  showSaving();
  api('/scoring/innings/' + currentInnings.id + '/ball', 'POST', payload).then(function(ball) {
    hideSaving();
    if (!ball || ball.detail) {
      toast(ball && ball.detail ? ball.detail : 'Error', 'error');
    }
    bgSync();
  });
}

function updateHeroInstant(runs, wickets, overs, balls) {
  var heroScore = el('heroScore');
  if (heroScore) {
    heroScore.innerHTML = runs + '/' + wickets + ' <span style="font-size:16px;opacity:0.7">(' + overs + '.' + balls + ' ov)</span>';
  }
  var totalB = overs * 6 + balls;
  var crr = totalB > 0 ? ((runs / totalB) * 6).toFixed(2) : '0.00';
  var heroRR = el('heroRR');
  if (heroRR) heroRR.textContent = 'CRR: ' + crr;
  // Show RRR for 2nd innings
  var heroRRR = el('heroRRR');
  if (heroRRR && currentInnings && currentInnings.innings_number >= 2 && matchData) {
    var prevInn = matchData.innings.find(function(i){return i.innings_number===currentInnings.innings_number-1;});
    if (prevInn) {
      var target = prevInn.total_runs + 1;
      var need = target - runs;
      var ballsLeft = (matchData.overs * 6) - totalB;
      if (need > 0 && ballsLeft > 0) {
        var rrr = ((need / ballsLeft) * 6).toFixed(2);
        heroRRR.textContent = 'RRR: ' + rrr;
        heroRRR.style.display = 'block';
      } else {
        heroRRR.style.display = 'none';
      }
    }
  } else if (heroRRR) {
    heroRRR.style.display = 'none';
  }
}

// Lightweight background sync — debounced, non-blocking
var bgSyncTimer = null;
var bgSyncRunning = false;
function bgSync() {
  if (bgSyncTimer) clearTimeout(bgSyncTimer);
  bgSyncTimer = setTimeout(function() {
    if (bgSyncRunning) return;
    bgSyncRunning = true;
    api('/scoring/match/' + MATCH_ID + '/live').then(function(live) {
      bgSyncRunning = false;
      if (!live || live.detail) return;
      var serverTotal = live.total_runs;
      var serverWickets = live.total_wickets;
      var parts = live.overs.split('.');
      var serverOvers = parseInt(parts[0]);
      var serverBalls = parseInt(parts[1] || '0');
      var serverTotalBalls = serverOvers * 6 + serverBalls;
      var localTotalBalls = currentInnings.total_overs * 6 + currentInnings.total_balls;
      // Only update if server is ahead or equal — never go backwards
      if (serverTotalBalls >= localTotalBalls) {
        currentInnings.total_runs = serverTotal;
        currentInnings.total_wickets = serverWickets;
        currentInnings.total_overs = serverOvers;
        currentInnings.total_balls = serverBalls;
        updateHeroInstant(serverTotal, serverWickets, serverOvers, serverBalls);
      }
      if (live.status === 'completed' || live.status === 'innings_break') {
        fullSync();
      }
    }).catch(function() { bgSyncRunning = false; });
  }, 1200);
}

// Full sync — only when innings ends or major state change
async function fullSync() {
  scoringLocked = true;
  // Show loading overlay
  el('scoringApp').insertAdjacentHTML('beforeend', '<div id="inningsOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center"><div style="text-align:center;color:#fff"><div class="spinner" style="margin:0 auto 16px;border-top-color:#34d399"></div><div style="font-size:16px;font-weight:700">Updating scores...</div></div></div>');

  // Wait for server to fully process
  await new Promise(function(r) { setTimeout(r, 2000); });

  matchData = await api('/matches/' + MATCH_ID);
  var prevInnId = currentInnings.id;
  currentInnings = matchData.innings.find(function(i) { return i.id === prevInnId; });

  var overlay = el('inningsOverlay');

  if (!currentInnings || currentInnings.is_completed) {
    var nextInn = matchData.innings.find(function(i) { return !i.is_completed; });
    if (nextInn) {
      // Show innings break message
      if (overlay) overlay.innerHTML = '<div style="text-align:center;color:#fff;padding:24px"><div style="font-size:48px;margin-bottom:16px">🏏</div><div style="font-size:22px;font-weight:800;margin-bottom:8px">Innings Complete</div><div style="font-size:14px;opacity:0.8">Switching to 2nd innings...</div></div>';
      await new Promise(function(r) { setTimeout(r, 2500); });

      currentInnings = nextInn;
      var battingTeam = teamsMap[currentInnings.batting_team_id];
      var bowlingTeam = teamsMap[currentInnings.bowling_team_id];
      battingPlayers = battingTeam ? battingTeam.players : [];
      bowlingPlayers = bowlingTeam ? bowlingTeam.players : [];
      striker = null; nonStriker = null; currentBowler = null;
      dismissedBatters = new Set();
      recentBalls = [];
      localStorage.removeItem('boxcric_scoring_' + MATCH_ID + '_' + currentInnings.id);
      if (overlay) overlay.remove();
      scoringLocked = false;
      renderScoringUI();
      toast('2nd innings started - select batsmen and bowler', 'success');
    } else {
      // Match is done - show result
      var result = matchData.result_summary || 'Match Completed';
      if (overlay) overlay.innerHTML = '<div style="text-align:center;color:#fff;padding:24px"><div style="font-size:48px;margin-bottom:16px">🏆</div><div style="font-size:22px;font-weight:800;margin-bottom:8px">' + result + '</div><div style="font-size:14px;opacity:0.8">Redirecting to match details...</div></div>';
      await new Promise(function(r) { setTimeout(r, 3000); });
      var backUrl = (window.location.pathname.indexOf('/app/')===0?'/app/match/':'/admin/match/') + MATCH_ID;
      window.location.href = backUrl;
    }
  } else {
    // Innings not complete yet — just update UI
    if (overlay) overlay.remove();
    scoringLocked = false;
    updateHeroInstant(currentInnings.total_runs, currentInnings.total_wickets, currentInnings.total_overs, currentInnings.total_balls);
  }
}

function openWicketModal() {
  if (scoringLocked) return;
  if (!validateSelection()) return;
  haptic(100);
  selectedWicketType = 'bowled';
  document.querySelectorAll('.wicket-type-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('[data-type="bowled"]').classList.add('selected');

  // Populate dismissed options (striker and non-striker)
  const dismissedSel = el('dismissedPlayer');
  dismissedSel.innerHTML = '';
  if (striker) {
    const sp = allPlayers.find(p => p.id === striker);
    dismissedSel.innerHTML += `<option value="${striker}" selected>${sp ? sp.name : 'Striker'}</option>`;
  }
  if (nonStriker) {
    const ns = allPlayers.find(p => p.id === nonStriker);
    dismissedSel.innerHTML += `<option value="${nonStriker}">${ns ? ns.name : 'Non-Striker'}</option>`;
  }

  // Populate fielder options
  const fielderSel = el('fielderPlayer');
  fielderSel.innerHTML = '<option value="">— None —</option>';
  bowlingPlayers.forEach(p => {
    fielderSel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });

  el('wicketModal').classList.add('open');
}

function closeWicketModal() { el('wicketModal').classList.remove('open'); }

function selectWicketType(btn) {
  document.querySelectorAll('.wicket-type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWicketType = btn.dataset.type;
  // Show/hide fielder based on type
  const needsFielder = ['caught','run_out','stumped'].includes(selectedWicketType);
  el('fielderGroup').style.display = needsFielder ? 'block' : 'none';
}

async function confirmWicket() {
  const dismissedId = parseInt(el('dismissedPlayer').value);
  const fielderId = el('fielderPlayer').value ? parseInt(el('fielderPlayer').value) : null;
  const runsOnBall = parseInt(el('wicketRuns').value || '0');

  const payload = {
    batter_id: striker,
    bowler_id: currentBowler,
    non_striker_id: nonStriker,
    runs_scored: runsOnBall,
    extra_type: 'none',
    extra_runs: 0,
    is_wicket: true,
    wicket_type: selectedWicketType,
    dismissed_player_id: dismissedId,
    fielder_id: fielderId,
    is_correction: pendingCorrection
  };

  const ball = await api(`/scoring/innings/${currentInnings.id}/ball`, 'POST', payload);
  closeWicketModal();

  if (ball && !ball.detail) {
    pendingCorrection = false;
    addRecentBall(runsOnBall, 'none', true);
    toast('WICKET! ☝️', 'error');

    // Optimistic wicket update
    currentInnings.total_wickets++;
    currentInnings.total_runs += runsOnBall;
    updateHeroInstant(currentInnings.total_runs, currentInnings.total_wickets, currentInnings.total_overs, currentInnings.total_balls);

    // Check if last man standing situation
    dismissedBatters.add(dismissedId);
    var availableBatters = battingPlayers.filter(function(p) {
      return !dismissedBatters.has(p.id) && p.id !== striker && p.id !== nonStriker;
    });

    if (availableBatters.length === 0) {
      // Last man standing — ask admin via popup
      confirmAction('LAST MAN STANDING! Only 1 batter remaining. Allow last man to continue batting alone?', async function() {
        // Continue with last man — set dismissed player's slot to null
        if (dismissedId === striker) {
          striker = null;
        } else {
          nonStriker = null;
        }
        saveSelections();
        toast('Last man batting! Innings continues.', 'info');
        bgSync();
      });
      return;
    }

    // Normal — prompt for new batter
    promptNewBatter(dismissedId);
    bgSync();
  } else {
    toast(ball && ball.detail ? ball.detail : 'Error', 'error');
  }
}

function promptNewBatter(dismissedId) {
  // Add the dismissed batter to the set
  dismissedBatters.add(dismissedId);

  const sel = el('newBatterSelect');
  sel.innerHTML = '<option value="">— Select New Batsman —</option>';
  battingPlayers.forEach(p => {
    // Only show batters who are not dismissed and not currently at crease
    if (!dismissedBatters.has(p.id) && p.id !== striker && p.id !== nonStriker) {
      sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    }
  });
  el('newBatterModal').classList.add('open');
  // Store who got out so we know which end to replace
  el('newBatterModal').dataset.dismissed = dismissedId;
}

function confirmNewBatter() {
  const newId = parseInt(el('newBatterSelect').value);
  if (!newId) { toast('Select a batsman', 'error'); return; }
  const dismissed = parseInt(el('newBatterModal').dataset.dismissed);

  if (dismissed === striker) {
    striker = newId;
    el('strikerSelect').value = newId;
  } else {
    nonStriker = newId;
    el('nonStrikerSelect').value = newId;
  }

  el('newBatterModal').classList.remove('open');
  toast('New batsman is in!', 'success');
  saveSelections();
}

function swapStrike() {
  [striker, nonStriker] = [nonStriker, striker];
  if (el('strikerSelect')) el('strikerSelect').value = striker || '';
  if (el('nonStrikerSelect')) el('nonStrikerSelect').value = nonStriker || '';
  saveSelections();
}

function promptBowlerChange() {
  // Show previous bowler name
  var prevName = '?';
  if (currentBowler) {
    for (var i = 0; i < bowlingPlayers.length; i++) {
      if (bowlingPlayers[i].id === currentBowler) { prevName = bowlingPlayers[i].name; break; }
    }
  }
  var noteEl = el('prevBowlerNote');
  if (noteEl) noteEl.textContent = currentBowler ? 'Previous bowler: ' + prevName + ' (same bowler cannot bowl consecutive overs)' : '';

  // Populate bowler options (exclude current bowler)
  var sel = el('newBowlerSelect');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Select Bowler —</option>';
  for (var i = 0; i < bowlingPlayers.length; i++) {
    var p = bowlingPlayers[i];
    var disabled = (p.id === currentBowler) ? ' disabled style="color:#999"' : '';
    var label = p.name + (p.id === currentBowler ? ' (bowled last over)' : '');
    sel.innerHTML += '<option value="' + p.id + '"' + disabled + '>' + label + '</option>';
  }

  el('changeBowlerModal').classList.add('open');
  toast('Over complete! Select next bowler.', 'info');
}

function confirmNewBowler() {
  var newId = parseInt(el('newBowlerSelect').value);
  if (!newId) { toast('Select a bowler!', 'error'); return; }
  currentBowler = newId;
  if (el('bowlerSelect')) el('bowlerSelect').value = newId;
  el('changeBowlerModal').classList.remove('open');
  saveSelections();
  toast('New bowler set!', 'success');
}

// refreshScore kept as alias for undo
async function refreshScore() { await fullSync(); }

async function switchInnings() {
  confirmAction('Switch to next innings?', async function() {
    // End current innings first via API
    if (currentInnings && !currentInnings.is_completed) {
      await api('/matches/' + MATCH_ID + '/end-innings/' + currentInnings.id, 'POST');
    }
    // Ensure match is LIVE for next innings
    await api('/matches/' + MATCH_ID + '/start', 'POST').catch(function(){});
    // Reload match data
    matchData = await api('/matches/' + MATCH_ID);
    var nextInn = matchData.innings.find(function(i) { return !i.is_completed; });
    if (nextInn) {
      currentInnings = nextInn;
      var battingTeam = teamsMap[currentInnings.batting_team_id];
      var bowlingTeam = teamsMap[currentInnings.bowling_team_id];
      battingPlayers = battingTeam ? battingTeam.players : [];
      bowlingPlayers = bowlingTeam ? bowlingTeam.players : [];
      striker = null; nonStriker = null; currentBowler = null;
      dismissedBatters = new Set();
      recentBalls = [];
      // Clear saved state for new innings
      localStorage.removeItem('boxcric_scoring_' + MATCH_ID + '_' + currentInnings.id);
      renderScoringUI();
      toast('Switched to ' + (currentInnings.innings_number <= 2 ? (currentInnings.innings_number === 1 ? '1st' : '2nd') : 'Super Over') + ' innings', 'success');
    } else {
      toast('No more innings. End the match.', 'info');
    }
  });
}

async function endCurrentInnings() {
  confirmAction('End current innings? This will mark it as completed.', async function() {
    if (currentInnings && !currentInnings.is_completed) {
      await api('/matches/' + MATCH_ID + '/end-innings/' + currentInnings.id, 'POST');
    }
    matchData = await api('/matches/' + MATCH_ID);
    var nextInn = matchData.innings.find(function(i) { return !i.is_completed; });
    if (nextInn) {
      currentInnings = nextInn;
      var battingTeam = teamsMap[currentInnings.batting_team_id];
      var bowlingTeam = teamsMap[currentInnings.bowling_team_id];
      battingPlayers = battingTeam ? battingTeam.players : [];
      bowlingPlayers = bowlingTeam ? bowlingTeam.players : [];
      striker = null; nonStriker = null; currentBowler = null;
      dismissedBatters = new Set();
      recentBalls = [];
      localStorage.removeItem('boxcric_scoring_' + MATCH_ID + '_' + currentInnings.id);
      renderScoringUI();
      toast('Innings ended! Now scoring ' + (currentInnings.innings_number === 1 ? '1st' : '2nd') + ' innings', 'success');
    } else {
      toast('Both innings done! End the match.', 'info');
      var backUrl = (window.location.pathname.indexOf('/app/') === 0) ? '/app/match/' + MATCH_ID : '/admin/match/' + MATCH_ID;
      setTimeout(function() { window.location.href = backUrl; }, 1500);
    }
  });
}

async function endMatchFromScore() {
  confirmAction('End this match and calculate result?', async function() {
    await api(`/matches/${MATCH_ID}/end`, 'POST');
    toast('Match ended!', 'success');
    setTimeout(() => { window.location.href = (window.location.pathname.indexOf('/app/')===0?'/app/match/':'/admin/match/') + MATCH_ID; }, 1000);
  });
}

function addRecentBall(runs, extraType, isWicket, extraRuns) {
  let label, cls;
  if (isWicket) { label = 'W'; cls = 'wicket'; }
  else if (extraType === 'wide') { label = 'Wd'; cls = 'wide'; }
  else if (extraType === 'no_ball') { label = 'NB'; cls = 'noball'; }
  else if (extraType === 'bye' || extraType === 'leg_bye') { label = `${extraRuns}B`; cls = 'runs-1'; }
  else if (runs === 0) { label = '•'; cls = 'dot'; }
  else if (runs === 4) { label = '4'; cls = 'runs-4'; }
  else if (runs === 6) { label = '6'; cls = 'runs-6'; }
  else { label = runs; cls = `runs-${Math.min(runs, 3)}`; }

  recentBalls.push({label, cls});
  if (recentBalls.length > 12) recentBalls = recentBalls.slice(-12);

  const disp = el('recentBallsDisplay');
  if (disp) {
    disp.innerHTML = recentBalls.map(b =>
      `<div class="ball-chip ${b.cls}">${b.label}</div>`
    ).join('');
  }
}

async function undoLastBall() {
  if (!currentInnings) return;
  confirmAction('Undo the last ball and re-score it? You can only correct each ball once.', async function() {
    const res = await api('/api/features/undo/' + currentInnings.id, 'DELETE');
    if (res && res.is_correction) {
      pendingCorrection = true;
      toast('Ball undone! Now score the correct ball.', 'success');
      if (recentBalls.length > 0) recentBalls.pop();
      const disp = el('recentBallsDisplay');
      if (disp) disp.innerHTML = recentBalls.map(b => `<div class="ball-chip ${b.cls}">${b.label}</div>`).join('');
      await refreshScore();
    } else {
      toast(res?.detail || 'Cannot undo this ball', 'error');
    }
  });
}

function changeOvers() {
  var current = matchData.overs;
  var newOvers = prompt('Change match overs (currently ' + current + ').\nEnter new number of overs:', current);
  if (!newOvers) return;
  newOvers = parseInt(newOvers);
  if (isNaN(newOvers) || newOvers < 1) { toast('Enter a valid number', 'error'); return; }
  if (newOvers === current) return;
  api('/matches/' + MATCH_ID + '/overs', 'PUT', {overs: newOvers}).then(function(res) {
    if (res && res.overs) {
      matchData.overs = res.overs;
      toast('Overs changed to ' + res.overs, 'success');
      renderScoringUI();
    } else {
      toast(res && res.detail ? res.detail : 'Failed', 'error');
    }
  });
}
</script>
