{% extends "base.html" %}
{% block title %}BOXcric — Match Detail{% endblock %}

{% block content %}
<div id="matchDetail">
  <div class="loading-center"><div class="spinner"></div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const MATCH_ID = {{ match_id }};
let matchData = null;
let teamsMap = {};
let liveWs = null;

document.addEventListener('DOMContentLoaded', async () => {
  const [teams, match] = await Promise.all([api('/teams/'), api('/matches/' + MATCH_ID)]);
  teams.forEach(t => teamsMap[t.id] = t);
  matchData = match;
  if (!matchData || matchData.detail) {
    el('matchDetail').innerHTML = emptyState('❌', 'Match not found', '');
    return;
  }
  renderMatchDetail();
  if (matchData.status === 'live' || matchData.status === 'innings_break') {
    connectWs();
    // Auto-refresh full scorecard every 10 seconds for live matches
    setInterval(loadMatch, 10000);
  }
});

function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  liveWs = new WebSocket(`${proto}://${location.host}/ws/live/${MATCH_ID}`);
  liveWs.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.error) return;
    updateLiveHero(data);
  };
  liveWs.onclose = () => { setTimeout(connectWs, 3000); };
}

async function loadMatch() {
  matchData = await api('/matches/' + MATCH_ID);
  if (matchData && !matchData.detail) renderMatchDetail();
}

function renderMatchDetail() {
  const m = matchData;
  const t1 = teamsMap[m.team1_id] || {name: 'Team 1', short_name: 'T1'};
  const t2 = teamsMap[m.team2_id] || {name: 'Team 2', short_name: 'T2'};
  const inn1 = m.innings.find(i => i.innings_number === 1);
  const inn2 = m.innings.find(i => i.innings_number === 2);

  let html = '';

  // Title bar
  html += `<div class="flex justify-between items-center mb-4">
    <div>
      <h1 class="page-title" style="margin-bottom:2px">${m.title || t1.name + ' vs ' + t2.name}</h1>
      <div class="text-sm text-muted">${m.venue || ''} ${m.date ? '• ' + new Date(m.date).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : ''} • ${m.overs} overs</div>
    </div>
    <div class="flex gap-2">
      ${statusBadge(m.status)}
      ${m.status === 'scheduled' ? `<button class="btn btn-primary btn-sm" onclick="showTossModal()">Record Toss</button>` : ''}
      ${m.status === 'toss' ? `<button class="btn btn-primary btn-sm" onclick="startMatch()">Start Match</button>` : ''}
      ${m.status === 'live' ? `<a href="/admin/score/${MATCH_ID}" class="btn btn-accent btn-sm">⚡ Score Match</a>` : ''}
      ${m.status === 'live' ? `<button class="btn btn-outline btn-sm" onclick="endMatch()">End Match</button>` : ''}
      ${m.status === 'innings_break' ? `<button class="btn btn-primary btn-sm" onclick="resumeMatch()">▶️ Resume 2nd Innings</button>` : ''}
      ${m.status === 'innings_break' ? `<a href="/admin/score/${MATCH_ID}" class="btn btn-accent btn-sm">⚡ Score Match</a>` : ''}
    </div>
  </div>`;

  // Live hero (if live)
  if (m.status === 'live' || m.status === 'innings_break') {
    html += `<div class="live-hero" id="liveHero">
      <div class="loading-center" style="padding:20px"><div class="spinner" style="border-top-color:#fff"></div></div>
    </div>`;
    // Win probability widget
    html += `<div id="winProbWidget" class="card mt-4" style="overflow:hidden"></div>`;
  }

  // Score summary cards
  if (inn1 || inn2) {
    html += `<div class="grid-2 mt-4">`;
    if (inn1) {
      const batTeam = teamsMap[inn1.batting_team_id] || {name:'Team'};
      html += `<div class="card">
        <div class="card-header"><span>${batTeam.name} — 1st Innings</span></div>
        <div class="card-body">
          <div class="innings-score">${inn1.total_runs}/${inn1.total_wickets} <span class="overs">(${inn1.total_overs}.${inn1.total_balls} ov)</span></div>
        </div>
      </div>`;
    }
    if (inn2) {
      const batTeam = teamsMap[inn2.batting_team_id] || {name:'Team'};
      html += `<div class="card">
        <div class="card-header"><span>${batTeam.name} — 2nd Innings</span></div>
        <div class="card-body">
          <div class="innings-score">${inn2.total_runs}/${inn2.total_wickets} <span class="overs">(${inn2.total_overs}.${inn2.total_balls} ov)</span></div>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  // Result
  if (m.result_summary) {
    html += `<div class="card mt-4"><div class="card-body text-center">
      <div class="text-lg fw-bold" style="color:var(--win-green)">🏆 ${m.result_summary}</div>
      ${m.result_summary === 'Match Tied' ? '<button class="btn btn-accent btn-sm mt-2" onclick="startSuperOver()">⚡ Start Super Over</button>' : ''}
    </div></div>`;
  }

  // Super Over innings (if any exist beyond inn 1&2)
  var superOvers = m.innings.filter(i => i.innings_number > 2);
  if (superOvers.length) {
    html += '<div class="card mt-4"><div class="card-header"><span>⚡ Super Over</span></div><div class="card-body">';
    superOvers.forEach(function(so) {
      var batTeam = teamsMap[so.batting_team_id] || {name:'Team'};
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">';
      html += '<span class="fw-bold">' + batTeam.name + '</span>';
      html += '<span class="innings-score" style="font-size:18px">' + so.total_runs + '/' + so.total_wickets + ' (' + so.total_overs + '.' + so.total_balls + ' ov)</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Scorecard tabs
  if (inn1 || inn2) {
    html += `<div class="mt-6"><h2 class="section-title">Scorecard</h2>
      <div class="tabs" id="scorecardTabs">`;
    if (inn1) html += `<button class="tab active" onclick="loadScorecard(${inn1.id}, this)">1st Innings</button>`;
    if (inn2) html += `<button class="tab" onclick="loadScorecard(${inn2.id}, this)">2nd Innings</button>`;
    html += `</div><div id="scorecardContent"><div class="loading-center"><div class="spinner"></div></div></div></div>`;
  }

  // Over-by-Over Graph
  if (inn1 || inn2) {
    html += `<div class="mt-6"><h2 class="section-title">📊 Match Graph</h2>
      <div id="matchGraph"><div class="loading-center"><div class="spinner"></div></div></div></div>`;
  }

  // Commentary section
  if (inn1 || inn2) {
    html += `<div class="mt-6"><h2 class="section-title">🎙️ Ball-by-Ball Commentary</h2>
      <div class="tabs" id="commTabs">`;
    if (inn1) html += `<button class="tab active" onclick="loadCommentary(1, this)">1st Innings</button>`;
    if (inn2) html += `<button class="tab" onclick="loadCommentary(2, this)">2nd Innings</button>`;
    html += `</div><div id="commContent"><div class="loading-center"><div class="spinner"></div></div></div></div>`;
  }

  // Toss info
  if (m.toss_winner_id) {
    const tossW = teamsMap[m.toss_winner_id] || {name:'?'};
    html += `<div class="card mt-4"><div class="card-body text-sm text-muted">
      <strong>Toss:</strong> ${tossW.name} won the toss and chose to ${m.toss_decision}
    </div></div>`;
  }

  // ===== EXTRA FEATURES SECTION =====

  // Emoji Reactions
  if (m.status === 'live' || m.status === 'completed') {
    html += `<div class="card mt-4"><div class="card-body">
      <div class="text-sm fw-bold mb-2">React!</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="reactionBar">
        <button onclick="sendReaction('🔥')" style="font-size:24px;border:none;background:none;cursor:pointer">🔥</button>
        <button onclick="sendReaction('🎉')" style="font-size:24px;border:none;background:none;cursor:pointer">🎉</button>
        <button onclick="sendReaction('😱')" style="font-size:24px;border:none;background:none;cursor:pointer">😱</button>
        <button onclick="sendReaction('👏')" style="font-size:24px;border:none;background:none;cursor:pointer">👏</button>
        <button onclick="sendReaction('💔')" style="font-size:24px;border:none;background:none;cursor:pointer">💔</button>
        <button onclick="sendReaction('😂')" style="font-size:24px;border:none;background:none;cursor:pointer">😂</button>
      </div>
      <div id="reactionCounts" class="text-sm text-muted mt-2"></div>
    </div></div>`;
  }

  // MOM Voting (after match)
  if (m.status === 'completed') {
    html += `<div class="card mt-4"><div class="card-header"><span>🏅 Man of the Match</span></div>
      <div class="card-body" id="momSection"><div class="loading-center"><div class="spinner"></div></div></div></div>`;
  }

  // Partnerships
  if (inn1 || inn2) {
    html += `<div class="card mt-4"><div class="card-header"><span>🤝 Partnerships</span></div>
      <div class="card-body" id="partnershipSection"><div class="loading-center"><div class="spinner"></div></div></div></div>`;
  }

  // Match Photos
  html += `<div class="card mt-4"><div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
    <span>📸 Match Photos</span>
    <label style="cursor:pointer"><span class="btn btn-sm btn-outline">+ Upload</span>
    <input type="file" accept="image/*" style="display:none" onchange="uploadMatchPhoto(this)"></label>
    </div><div class="card-body" id="photoSection"></div></div>`;

  // Milestones
  html += `<div class="card mt-4"><div class="card-header"><span>🏆 Milestones</span></div>
    <div class="card-body" id="milestoneSection"></div></div>`;

  // Undo button (admin only, live match)
  if (m.status === 'live') {
    const activeInn = m.innings.find(i => !i.is_completed);
    if (activeInn) {
      html += `<div class="mt-4 text-center"><button class="btn btn-outline btn-sm" onclick="undoLastBall(${activeInn.id})" style="color:var(--accent)">↩️ Undo Last Ball</button></div>`;
    }
  }

  // Delete match button
  html += `<div class="mt-4 text-center"><button class="btn btn-outline btn-sm" onclick="deleteMatch(${m.id})" style="color:var(--accent)">🗑 Delete Match</button></div>`;

  el('matchDetail').innerHTML = html;

  // Load first scorecard + commentary + graph
  if (inn1) loadScorecard(inn1.id, null);
  if (inn1) loadCommentary(1, null);
  if (inn1 || inn2) loadMatchGraph();
  // Load extra features
  loadReactions();
  if (m.status === 'completed') loadMOM();
  if (inn1 || inn2) loadPartnerships();
  loadPhotos();
  loadMilestones();
  // Load live hero + win probability
  if (m.status === 'live' || m.status === 'innings_break') {
    loadLiveScore();
    loadWinProbability();
    setInterval(loadWinProbability, 10000); // refresh every 10s
  }
}

async function loadWinProbability() {
  try {
    var data = await api('/api/probability/' + MATCH_ID);
    if (!data || data.error) return;
    var widget = el('winProbWidget');
    if (!widget) return;

    var t1 = data.team1_name || 'Team 1';
    var t2 = data.team2_name || 'Team 2';
    var p1 = data.team1 || 50;
    var p2 = data.team2 || 50;

    var h = '<div class="card-header"><span>📊 Win Probability</span></div>';
    h += '<div class="card-body">';

    // Probability bar
    h += '<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px">';
    h += '<span style="color:var(--primary)">' + t1 + ' ' + p1 + '%</span>';
    h += '<span style="color:var(--accent)">' + t2 + ' ' + p2 + '%</span>';
    h += '</div>';
    h += '<div style="height:12px;background:var(--accent);border-radius:6px;overflow:hidden">';
    h += '<div style="height:100%;width:' + p1 + '%;background:var(--primary);border-radius:6px;transition:width 0.5s"></div>';
    h += '</div>';

    // Analysis
    if (data.analysis) {
      h += '<div class="text-sm text-muted mt-2" style="text-align:center">' + data.analysis + '</div>';
    }

    // Factors
    if (data.factors && data.factors.length) {
      h += '<div class="mt-2" style="border-top:1px solid var(--border);padding-top:8px">';
      for (var i = 0; i < data.factors.length; i++) {
        h += '<div class="text-sm" style="padding:3px 0;color:var(--text-light)">' + data.factors[i] + '</div>';
      }
      h += '</div>';
    }

    h += '</div>';
    widget.innerHTML = h;
  } catch(e) {}
}

async function loadLiveScore() {
  try {
    const data = await api(`/scoring/match/${MATCH_ID}/live`);
    if (data && !data.detail) updateLiveHero(data);
  } catch(e) {}
}

function updateLiveHero(d) {
  const hero = el('liveHero');
  if (!hero) return;
  let h = `<div class="score-team">${d.batting_team} vs ${d.bowling_team}</div>
    <div class="score-big">${d.total_runs}/${d.total_wickets} <span class="overs">(${d.overs} ov)</span></div>
    <div class="score-meta">
      <span>CRR: ${d.run_rate}</span>
      ${d.target ? `<span>Target: ${d.target}</span>` : ''}
      ${d.required_rate ? `<span>RRR: ${d.required_rate}</span>` : ''}
    </div>`;
  if (d.last_ball) h += `<div class="mt-2 text-sm" style="opacity:0.8">Last: ${d.last_ball}</div>`;
  hero.innerHTML = h;
}

async function loadScorecard(inningsId, tabEl) {
  if (tabEl) {
    document.querySelectorAll('#scorecardTabs .tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
  }
  el('scorecardContent').innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  const sc = await api(`/scoring/innings/${inningsId}/scorecard`);
  if (!sc || sc.detail) {
    el('scorecardContent').innerHTML = '<p class="text-muted text-center mt-4">No scorecard data yet</p>';
    return;
  }
  let h = `<div class="scorecard-header">
    <div class="innings-score">${sc.total_runs}/${sc.total_wickets} <span class="overs">(${sc.overs} ov)</span></div>
  </div>`;

  // Batting
  h += `<table class="scorecard-table"><thead><tr>
    <th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th>
  </tr></thead><tbody>`;
  sc.batters.forEach(b => {
    var dimStyle = b.dismissal === 'not out' ? 'color:#059669;font-weight:600' : 'color:var(--text-light)';
    h += `<tr><td><span class="batter-name">${b.player_name}</span><span class="dismissal" style="${dimStyle}">${b.dismissal}</span></td>
      <td><strong>${b.runs}</strong></td><td>${b.balls_faced}</td>
      <td>${b.fours}</td><td>${b.sixes}</td><td>${b.strike_rate}</td></tr>`;
  });
  h += `<tr class="extras-row"><td>Extras</td><td colspan="5">${sc.total_extras || 0}</td></tr>`;
  h += `<tr class="total-row"><td><strong>Total</strong></td><td colspan="5"><strong>${sc.total_runs}/${sc.total_wickets}</strong> (${sc.overs} ov)</td></tr>`;
  h += `</tbody></table>`;

  // Bowling
  h += `<h4 class="mt-4 mb-2" style="font-size:13px;color:var(--text-light);text-transform:uppercase">Bowling</h4>`;
  h += `<table class="scorecard-table"><thead><tr>
    <th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th>
  </tr></thead><tbody>`;
  sc.bowlers.forEach(b => {
    h += `<tr><td><span class="batter-name">${b.player_name}</span></td>
      <td>${b.overs}</td><td>${b.maidens}</td><td>${b.runs_conceded}</td>
      <td><strong>${b.wickets}</strong></td><td>${b.economy}</td></tr>`;
  });
  h += `</tbody></table>`;

  el('scorecardContent').innerHTML = h;
}

async function loadCommentary(innNum, tabEl) {
  if (tabEl) {
    document.querySelectorAll('#commTabs .tab').forEach(function(t) { t.classList.remove('active'); });
    tabEl.classList.add('active');
  }
  var container = el('commContent');
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  var data = await api('/api/commentary/match/' + MATCH_ID + '?innings=' + innNum + '&limit=100');
  if (!data || !data.length) {
    container.innerHTML = '<p class="text-muted text-center mt-4">No commentary yet</p>';
    return;
  }

  var h = '<div class="card"><div class="card-body" style="padding:0">';
  h += '<ul class="commentary-list" style="list-style:none;padding:0;margin:0">';
  for (var i = 0; i < data.length; i++) {
    var c = data[i];
    var bg = '';
    if (c.is_wicket) bg = 'background:#fef2f2;';
    else if (c.is_six) bg = 'background:#f5f3ff;';
    else if (c.is_four) bg = 'background:#ecfdf5;';

    h += '<li class="commentary-item" style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;' + bg + '">';
    h += '<div style="min-width:38px;text-align:right;padding-top:2px">';
    if (c.is_wicket) h += '<span style="background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">W</span>';
    else if (c.is_six) h += '<span style="background:#7c3aed;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">6</span>';
    else if (c.is_four) h += '<span style="background:#059669;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">4</span>';
    else if (c.is_extra) h += '<span style="background:#f59e0b;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">E</span>';
    else if (c.runs === 0) h += '<span style="background:#6b7280;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">•</span>';
    else h += '<span style="background:#2563eb;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">' + c.runs + '</span>';
    h += '</div>';
    h += '<div style="flex:1;font-size:13px;color:var(--text)">' + c.text + '</div>';
    h += '</li>';
  }
  h += '</ul></div></div>';
  container.innerHTML = h;
}

async function loadMatchGraph() {
  var container = el('matchGraph');
  if (!container) return;
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  var data = await api('/scoring/match/' + MATCH_ID + '/graph');
  if (!data) { container.innerHTML = ''; return; }

  var inn1 = data.innings_1;
  var inn2 = data.innings_2;
  if (!inn1 && !inn2) { container.innerHTML = '<p class="text-muted text-center">No data yet</p>'; return; }

  var maxOver = 0;
  var maxRuns = 0;
  if (inn1) { maxOver = Math.max(maxOver, inn1.overs.length); maxRuns = Math.max(maxRuns, inn1.total); }
  if (inn2) { maxOver = Math.max(maxOver, inn2.overs.length); maxRuns = Math.max(maxRuns, inn2.total); }
  if (maxOver === 0) { container.innerHTML = ''; return; }

  var inn1Name = inn1 ? (teamsMap[inn1.batting_team_id] || {name:'Inn 1'}).name : '';
  var inn2Name = inn2 ? (teamsMap[inn2.batting_team_id] || {name:'Inn 2'}).name : '';

  var barW = Math.max(20, Math.floor(600 / maxOver) - 8);
  var graphH = 120;
  var maxY = Math.max(maxRuns + 10, 20);

  var h = '<div class="card"><div class="card-body">';

  // Legend
  h += '<div style="display:flex;gap:16px;justify-content:center;margin-bottom:12px;font-size:12px;font-weight:600">';
  if (inn1) h += '<span><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:var(--primary);margin-right:4px;vertical-align:middle"></span>' + inn1Name + ' (' + inn1.total + '/' + inn1.wickets + ')</span>';
  if (inn2) h += '<span><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:var(--accent);margin-right:4px;vertical-align:middle"></span>' + inn2Name + ' (' + inn2.total + '/' + inn2.wickets + ')</span>';
  h += '</div>';

  // Bar chart: runs per over
  h += '<div style="font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:6px">Runs per Over</div>';
  h += '<div style="display:flex;align-items:flex-end;gap:4px;height:' + graphH + 'px;border-bottom:2px solid var(--border);padding-bottom:2px;padding-top:20px;overflow:visible">';

  for (var i = 0; i < maxOver; i++) {
    var o1 = inn1 && inn1.overs[i] ? inn1.overs[i] : null;
    var o2 = inn2 && inn2.overs[i] ? inn2.overs[i] : null;
    var maxOverRuns = Math.max(o1 ? o1.runs_this_over : 0, o2 ? o2.runs_this_over : 0, 1);
    var barMax = Math.max(maxRuns > 0 ? maxRuns / maxOver * 2.5 : 20, 10);

    h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">';

    // Stacked bars
    h += '<div style="display:flex;gap:1px;align-items:flex-end;width:100%;justify-content:center;height:' + (graphH - 20) + 'px">';
    if (o1) {
      var h1 = Math.max(4, (o1.runs_this_over / barMax) * (graphH - 20));
      var barColor = 'var(--primary)';
      if (o1.wickets_this_over > 0) barColor = '#ef4444';
      h += '<div style="width:' + (inn2 ? '45%' : '70%') + ';height:' + h1 + 'px;background:' + barColor + ';border-radius:3px 3px 0 0;position:relative;min-height:4px" title="' + inn1Name + ': ' + o1.runs_this_over + ' runs' + (o1.wickets_this_over ? ', ' + o1.wickets_this_over + 'W' : '') + '">';
      h += '<div style="position:absolute;top:-16px;width:100%;text-align:center;font-size:10px;font-weight:700;color:var(--text)">' + o1.runs_this_over;
      if (o1.wickets_this_over > 0) h += '<span style="color:#ef4444">W</span>';
      h += '</div></div>';
    }
    if (o2) {
      var h2 = Math.max(4, (o2.runs_this_over / barMax) * (graphH - 20));
      var barColor2 = 'var(--accent)';
      if (o2.wickets_this_over > 0) barColor2 = '#f59e0b';
      h += '<div style="width:45%;height:' + h2 + 'px;background:' + barColor2 + ';border-radius:3px 3px 0 0;position:relative;min-height:4px" title="' + inn2Name + ': ' + o2.runs_this_over + ' runs' + (o2.wickets_this_over ? ', ' + o2.wickets_this_over + 'W' : '') + '">';
      h += '<div style="position:absolute;top:-16px;width:100%;text-align:center;font-size:10px;font-weight:700;color:var(--text)">' + o2.runs_this_over;
      if (o2.wickets_this_over > 0) h += '<span style="color:#f59e0b">W</span>';
      h += '</div></div>';
    }
    h += '</div>';

    // Over label
    h += '<div style="font-size:10px;color:var(--text-muted)">' + (i + 1) + '</div>';
    h += '</div>';
  }
  h += '</div>';

  // Worm chart (cumulative runs)
  h += '<div style="font-size:12px;font-weight:600;color:var(--text-light);margin:16px 0 6px">Run Progression (Worm)</div>';
  var svgW = 600;
  var svgH = 100;
  h += '<div style="overflow-x:auto"><svg viewBox="0 0 ' + svgW + ' ' + svgH + '" style="width:100%;max-width:600px;height:auto">';

  // Grid lines
  for (var g = 0; g <= 4; g++) {
    var gy = svgH - (g / 4 * (svgH - 20));
    h += '<line x1="30" y1="' + gy + '" x2="' + svgW + '" y2="' + gy + '" stroke="var(--border)" stroke-width="0.5"/>';
    h += '<text x="0" y="' + (gy + 4) + '" font-size="9" fill="var(--text-muted)">' + Math.round(maxY * g / 4) + '</text>';
  }

  // Draw worm lines
  function drawWorm(overs, color) {
    if (!overs || overs.length === 0) return '';
    var points = [];
    var xStep = (svgW - 40) / maxOver;
    for (var j = 0; j < overs.length; j++) {
      var x = 35 + j * xStep;
      var y = svgH - 10 - (overs[j].cumulative_runs / maxY * (svgH - 25));
      points.push(x + ',' + y);
    }
    var path = '<polyline points="' + points.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    // Dots at each over
    for (var j = 0; j < overs.length; j++) {
      var x = 35 + j * xStep;
      var y = svgH - 10 - (overs[j].cumulative_runs / maxY * (svgH - 25));
      path += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="' + color + '"/>';
      // Wicket marker
      if (overs[j].wickets_this_over > 0) {
        path += '<text x="' + x + '" y="' + (y - 8) + '" font-size="10" text-anchor="middle" fill="#ef4444" font-weight="bold">W</text>';
      }
    }
    return path;
  }

  if (inn1) h += drawWorm(inn1.overs, '#1a472a');
  if (inn2) h += drawWorm(inn2.overs, '#e63946');

  h += '</svg></div>';

  // Over-by-over stats table
  h += '<div style="font-size:12px;font-weight:600;color:var(--text-light);margin:16px 0 6px">Over Details</div>';
  h += '<div style="overflow-x:auto"><table class="scorecard-table"><thead><tr>';
  h += '<th>Over</th>';
  if (inn1) h += '<th>' + inn1Name + '</th><th>W</th><th>CRR</th>';
  if (inn2) h += '<th>' + inn2Name + '</th><th>W</th><th>CRR</th>';
  h += '</tr></thead><tbody>';

  for (var i = 0; i < maxOver; i++) {
    var o1 = inn1 && inn1.overs[i] ? inn1.overs[i] : null;
    var o2 = inn2 && inn2.overs[i] ? inn2.overs[i] : null;
    h += '<tr>';
    h += '<td><strong>' + (i + 1) + '</strong></td>';
    if (inn1) {
      if (o1) {
        h += '<td><strong>' + o1.runs_this_over + '</strong> <span class="text-muted text-sm">(' + o1.cumulative_runs + ')</span></td>';
        h += '<td>' + (o1.wickets_this_over > 0 ? '<span style="color:var(--accent);font-weight:700">' + o1.wickets_this_over + '</span>' : '-') + '</td>';
        h += '<td>' + o1.run_rate + '</td>';
      } else { h += '<td>-</td><td>-</td><td>-</td>'; }
    }
    if (inn2) {
      if (o2) {
        h += '<td><strong>' + o2.runs_this_over + '</strong> <span class="text-muted text-sm">(' + o2.cumulative_runs + ')</span></td>';
        h += '<td>' + (o2.wickets_this_over > 0 ? '<span style="color:var(--accent);font-weight:700">' + o2.wickets_this_over + '</span>' : '-') + '</td>';
        h += '<td>' + o2.run_rate + '</td>';
      } else { h += '<td>-</td><td>-</td><td>-</td>'; }
    }
    h += '</tr>';
  }
  h += '</tbody></table></div>';

  h += '</div></div>';
  container.innerHTML = h;
}

async function showTossModal() {
  const m = matchData;
  const t1 = teamsMap[m.team1_id] || {name:'Team 1'};
  const t2 = teamsMap[m.team2_id] || {name:'Team 2'};
  openModal('Record Toss', `
    <div class="form-group">
      <label>Toss won by</label>
      <select id="tossWinner">
        <option value="${m.team1_id}">${t1.name}</option>
        <option value="${m.team2_id}">${t2.name}</option>
      </select>
    </div>
    <div class="form-group">
      <label>Chose to</label>
      <select id="tossDecision">
        <option value="bat">Bat</option>
        <option value="bowl">Bowl</option>
      </select>
    </div>
  `, async () => {
    await api(`/matches/${MATCH_ID}/toss`, 'POST', {
      toss_winner_id: parseInt(el('tossWinner').value),
      toss_decision: el('tossDecision').value
    });
    closeModal();
    toast('Toss recorded!', 'success');
    await loadMatch();
  });
}

async function startMatch() {
  confirmAction('Start this match?', async function() {
    await api(`/matches/${MATCH_ID}/start`, 'POST');
    toast('Match started! 🏏', 'success');
    await loadMatch();
  });
}

async function resumeMatch() {
  confirmAction('Resume match for 2nd innings?', async function() {
    await api('/matches/' + MATCH_ID + '/start', 'POST');
    toast('Match resumed! 🏏', 'success');
    await loadMatch();
  });
}

async function endMatch() {
  confirmAction('End this match? This will finalize the result.', async function() {
    await api(`/matches/${MATCH_ID}/end`, 'POST');
    await api(`/api/features/milestones/check/${MATCH_ID}`);
    toast('Match completed!', 'success');
    await loadMatch();
  });
}

async function startSuperOver() {
  confirmAction('Start a Super Over? Both teams will bat 1 over each.', async function() {
    var res = await api('/matches/' + MATCH_ID + '/super-over', 'POST');
    if (res && res.id) {
      toast('⚡ Super Over started!', 'success');
      await loadMatch();
    } else {
      toast(res && res.detail ? res.detail : 'Failed', 'error');
    }
  });
}

// ===== REACTIONS =====
async function sendReaction(emoji) {
  haptic(20);
  await api('/api/features/react?match_id=' + MATCH_ID + '&emoji=' + encodeURIComponent(emoji), 'POST');
  loadReactions();
}
async function loadReactions() {
  var data = await api('/api/features/reactions/' + MATCH_ID);
  var c = el('reactionCounts');
  if (!c || !data) return;
  var h = '';
  for (var e in data) { h += '<span style="margin-right:8px">' + e + ' ' + data[e] + '</span>'; }
  c.innerHTML = h;
}

// ===== MOM =====
async function loadMOM() {
  var c = el('momSection'); if (!c) return;
  var data = await api('/api/features/mom/' + MATCH_ID);
  if (!data) return;
  var h = '';
  if (data.winner) {
    h += '<div style="text-align:center;font-size:18px;font-weight:700;margin-bottom:12px">🏅 ' + data.winner.player_name + ' <span class="text-sm text-muted">(' + data.winner.votes + ' votes)</span></div>';
  }
  h += '<div class="text-sm text-muted mb-2">Vote for MOM:</div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  // Get all players from both teams
  var allP = [];
  if (teamsMap[matchData.team1_id]) allP = allP.concat(teamsMap[matchData.team1_id].players || []);
  if (teamsMap[matchData.team2_id]) allP = allP.concat(teamsMap[matchData.team2_id].players || []);
  allP.forEach(function(p) {
    h += '<button class="btn btn-outline btn-sm" onclick="voteMOM(' + p.id + ')">' + p.name + '</button>';
  });
  h += '</div>';
  if (data.votes && data.votes.length) {
    h += '<div class="mt-2">';
    data.votes.forEach(function(v) { h += '<div class="text-sm">' + v.player_name + ': ' + v.votes + ' votes</div>'; });
    h += '</div>';
  }
  c.innerHTML = h;
}
async function voteMOM(pid) {
  await api('/api/features/mom/vote?match_id=' + MATCH_ID + '&player_id=' + pid, 'POST');
  toast('Vote recorded!', 'success');
  loadMOM();
}

// ===== PARTNERSHIPS =====
async function loadPartnerships() {
  var c = el('partnershipSection'); if (!c) return;
  var inn1 = matchData.innings.find(function(i){return i.innings_number===1;});
  var inn2 = matchData.innings.find(function(i){return i.innings_number===2;});
  var h = '';
  if (inn1) {
    var p1 = await api('/api/features/partnerships/' + inn1.id);
    if (p1 && p1.length) {
      h += '<div class="text-sm fw-bold mb-2">1st Innings</div>';
      p1.forEach(function(p) {
        var w = p.not_out ? p.wicket + '*' : p.wicket;
        h += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span class="text-sm">' + p.pair + '</span><span class="text-sm fw-bold">' + p.runs + ' (' + p.balls + 'b)</span></div>';
      });
    }
  }
  if (inn2) {
    var p2 = await api('/api/features/partnerships/' + inn2.id);
    if (p2 && p2.length) {
      h += '<div class="text-sm fw-bold mt-4 mb-2">2nd Innings</div>';
      p2.forEach(function(p) {
        h += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span class="text-sm">' + p.pair + '</span><span class="text-sm fw-bold">' + p.runs + ' (' + p.balls + 'b)</span></div>';
      });
    }
  }
  c.innerHTML = h || '<p class="text-muted text-sm">No partnership data yet</p>';
}

// ===== PHOTOS =====
async function loadPhotos() {
  var c = el('photoSection'); if (!c) return;
  var data = await api('/api/features/photos/' + MATCH_ID);
  if (!data || !data.length) { c.innerHTML = '<p class="text-muted text-sm">No photos yet</p>'; return; }
  var h = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">';
  data.forEach(function(p) {
    h += '<div style="position:relative"><img src="' + p.url + '" style="width:100%;border-radius:8px;aspect-ratio:1;object-fit:cover">';
    if (p.caption) h += '<div class="text-sm text-muted" style="margin-top:2px">' + p.caption + '</div>';
    h += '<button onclick="deletePhoto(' + p.id + ')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer">×</button></div>';
  });
  h += '</div>';
  c.innerHTML = h;
}
async function uploadMatchPhoto(input) {
  if (!input.files[0]) return;
  var fd = new FormData();
  fd.append('match_id', MATCH_ID);
  fd.append('photo', input.files[0]);
  fd.append('caption', prompt('Caption (optional):') || '');
  await fetch('/api/features/photos/upload', {method:'POST',body:fd});
  toast('Photo uploaded!', 'success');
  loadPhotos();
}
async function deletePhoto(id) {
  confirmAction('Delete this photo?', async function() {
    await api('/api/features/photos/' + id, 'DELETE');
    loadPhotos();
  });
}

// ===== MILESTONES =====
async function loadMilestones() {
  var c = el('milestoneSection'); if (!c) return;
  var data = await api('/api/features/milestones');
  if (!data || !data.length) { c.innerHTML = '<p class="text-muted text-sm">No milestones yet</p>'; return; }
  var h = '';
  data.forEach(function(m) {
    h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">';
    h += '<span style="font-size:20px">' + (m.badge === 'century' ? '💯' : m.badge === 'fifty' ? '🔥' : m.badge === 'five_wickets' ? '🎯' : '⭐') + '</span>';
    h += '<div><div class="text-sm fw-bold">' + m.title + '</div>';
    if (m.description) h += '<div class="text-sm text-muted">' + m.description + '</div>';
    h += '</div></div>';
  });
  c.innerHTML = h;
}

// ===== UNDO =====
async function undoLastBall(innId) {
  confirmAction('Undo the last ball? You can only correct each ball once.', async function() {
    var res = await api('/api/features/undo/' + innId, 'DELETE');
    if (res && res.detail) {
      toast(res.detail, 'success');
    } else {
      toast(res?.detail || 'Cannot undo this ball', 'error');
    }
    await loadMatch();
  });
}

// ===== DELETE MATCH =====
async function deleteMatch(matchId) {
  confirmAction('Delete this match permanently? All scores, innings, and related data will be lost.', async function() {
    var res = await api('/matches/' + matchId, 'DELETE');
    if (res && res.detail) {
      toast(res.detail, 'success');
      setTimeout(function() { window.location.href = '/admin/matches'; }, 1000);
    } else {
      toast(res?.detail || 'Failed to delete match', 'error');
    }
  });
}
</script>
{% endblock %}
