{% extends "base.html" %}
{% block title %}BOXcric — Players{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-4">
  <h1 class="page-title">Players</h1>
  <button class="btn btn-primary btn-sm" onclick="showAddPlayer()">+ Add Player</button>
</div>

<div class="player-grid" id="playerGrid">
  <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>
</div>

<!-- Player Stats Detail -->
<div class="modal-backdrop" id="playerStatsModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 id="playerStatsName">Player Stats</h3>
      <button class="modal-close" onclick="el('playerStatsModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body" id="playerStatsBody">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Add Player Modal -->
<div class="modal-backdrop" id="addPlayerModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Player</h3>
      <button class="modal-close" onclick="el('addPlayerModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="pName" placeholder="Player name">
      </div>
      <div class="form-group">
        <label>Nickname</label>
        <input type="text" id="pNickname" placeholder="Nickname">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Batting Style</label>
          <select id="pBatStyle">
            <option value="right_hand">Right Hand</option>
            <option value="left_hand">Left Hand</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bowling Style</label>
          <select id="pBowlStyle">
            <option value="none">None</option>
            <option value="right_arm_fast">Right Arm Fast</option>
            <option value="left_arm_fast">Left Arm Fast</option>
            <option value="right_arm_medium">Right Arm Medium</option>
            <option value="left_arm_medium">Left Arm Medium</option>
            <option value="right_arm_offspin">Right Arm Offspin</option>
            <option value="left_arm_orthodox">Left Arm Orthodox</option>
            <option value="right_arm_legspin">Right Arm Legspin</option>
            <option value="left_arm_chinaman">Left Arm Chinaman</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="pPhone" placeholder="Phone number">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="el('addPlayerModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="savePlayer()">Save Player</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let players = [];

document.addEventListener('DOMContentLoaded', async () => {
  await loadPlayers();
});

async function loadPlayers() {
  players = await api('/players/');
  if (!players.length) {
    el('playerGrid').innerHTML = emptyState('👤', 'No players yet', 'Add your first player to get started.');
    return;
  }
  el('playerGrid').innerHTML = players.map(p => {
    const initials = p.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const role = getRoleLabel(p.batting_style, p.bowling_style);
    const badge = p.user_id ? '<span style="background:#2d6a4f;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px">👤 User</span>' : '';
    return `<div class="player-card" onclick="viewPlayerStats(${p.id})">
      <div class="player-avatar">${initials}</div>
      <div class="player-info">
        <div class="player-name">${p.name}${p.nickname ? ' <span class="text-muted text-sm">(' + p.nickname + ')</span>' : ''}${badge}</div>
        <div class="player-role">${role}</div>
      </div>
    </div>`;
  }).join('');
}

function getRoleLabel(bat, bowl) {
  if (bowl === 'none') return formatStyle(bat) + ' Batter';
  return formatStyle(bat) + ' • ' + formatBowlStyle(bowl);
}

function formatStyle(s) { return s === 'right_hand' ? 'RHB' : 'LHB'; }
function formatBowlStyle(s) {
  const map = {
    right_arm_fast: 'RF', left_arm_fast: 'LF', right_arm_medium: 'RM',
    left_arm_medium: 'LM', right_arm_offspin: 'OB', left_arm_orthodox: 'SLA',
    right_arm_legspin: 'LB', left_arm_chinaman: 'LC', none: ''
  };
  return map[s] || s;
}

function showAddPlayer() {
  el('pName').value = '';
  el('pNickname').value = '';
  el('pPhone').value = '';
  el('addPlayerModal').classList.add('open');
}

async function savePlayer() {
  const name = el('pName').value.trim();
  if (!name) { toast('Name is required!', 'error'); return; }
  const payload = {
    name,
    nickname: el('pNickname').value.trim() || null,
    batting_style: el('pBatStyle').value,
    bowling_style: el('pBowlStyle').value,
    phone: el('pPhone').value.trim() || null
  };
  const res = await api('/players/', 'POST', payload);
  if (res && res.id) {
    el('addPlayerModal').classList.remove('open');
    toast('Player added!', 'success');
    await loadPlayers();
  } else {
    toast(res?.detail || 'Error', 'error');
  }
}

async function viewPlayerStats(pid) {
  const player = players.find(p => p.id === pid);
  el('playerStatsName').textContent = player ? player.name : 'Player Stats';
  el('playerStatsBody').innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  el('playerStatsModal').classList.add('open');

  const stats = await api(`/stats/player/${pid}`);
  if (!stats || stats.detail) {
    el('playerStatsBody').innerHTML = '<p class="text-muted text-center">No stats available yet. Play some matches!</p>';
    return;
  }

  el('playerStatsBody').innerHTML = `
    <p class="text-sm text-muted mb-4">${stats.matches} match${stats.matches !== 1 ? 'es' : ''} played</p>
    <h4 style="font-size:13px;text-transform:uppercase;color:var(--text-light);margin-bottom:8px">🏏 Batting</h4>
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-value">${stats.total_runs}</div><div class="stat-label">Runs</div></div>
      <div class="stat-card"><div class="stat-value">${stats.batting_average}</div><div class="stat-label">Average</div></div>
      <div class="stat-card"><div class="stat-value">${stats.strike_rate}</div><div class="stat-label">SR</div></div>
      <div class="stat-card"><div class="stat-value">${stats.highest_score}</div><div class="stat-label">HS</div></div>
      <div class="stat-card"><div class="stat-value">${stats.innings_batted}</div><div class="stat-label">Innings</div></div>
      <div class="stat-card"><div class="stat-value">${stats.not_outs}</div><div class="stat-label">N/O</div></div>
      <div class="stat-card"><div class="stat-value">${stats.fours}</div><div class="stat-label">4s</div></div>
      <div class="stat-card"><div class="stat-value">${stats.sixes}</div><div class="stat-label">6s</div></div>
    </div>
    <h4 style="font-size:13px;text-transform:uppercase;color:var(--text-light);margin:16px 0 8px">🎯 Bowling</h4>
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-value">${stats.total_wickets}</div><div class="stat-label">Wickets</div></div>
      <div class="stat-card"><div class="stat-value">${stats.bowling_average}</div><div class="stat-label">Average</div></div>
      <div class="stat-card"><div class="stat-value">${stats.economy}</div><div class="stat-label">Economy</div></div>
      <div class="stat-card"><div class="stat-value">${stats.best_bowling}</div><div class="stat-label">Best</div></div>
    </div>
    <div class="mt-4 text-right">
      <button class="btn btn-outline btn-sm" onclick="deletePlayer(${pid})">🗑 Delete Player</button>
    </div>`;
}

async function deletePlayer(pid) {
  confirmAction('Delete this player?', async function() {
    await api(`/players/${pid}`, 'DELETE');
    el('playerStatsModal').classList.remove('open');
    toast('Player deleted', 'success');
    await loadPlayers();
  });
}
</script>
{% endblock %}
