<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{% block title %}BOXcric{% endblock %}</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1a472a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BOXcric">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/static/icons/icon-512.png">

  <!-- Splash screens (iOS) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="/static/css/style.css?v=22">
  <link rel="stylesheet" href="/static/css/icons.css?v=1">
  <link rel="icon" href="/static/images/logo.svg" type="image/svg+xml">
  <style>
    [data-theme="dark"] .page-title, [data-theme="dark"] .section-title { color: #fff !important; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    [data-theme="dark"] .tab { color: #fff !important; }
    [data-theme="dark"] .tab.active { color: #34d399 !important; }
    [data-theme="dark"] .text-muted { color: #c0cdd8 !important; }
    [data-theme="dark"] .empty-state h3 { color: #fff !important; }
    [data-theme="dark"] .empty-state p { color: #c0cdd8 !important; }
    [data-theme="dark"] h1, [data-theme="dark"] h2, [data-theme="dark"] h3, [data-theme="dark"] h4 { color: #fff !important; }
    [data-theme="dark"] p, [data-theme="dark"] td, [data-theme="dark"] th, [data-theme="dark"] label, [data-theme="dark"] span, [data-theme="dark"] li { color: #e0e8f0; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <button class="hamburger" onclick="toggleNav()" aria-label="Menu">☰</button>
      <a href="/admin" class="logo"><img src="/static/images/logo.svg" alt="BOXcric" style="height:44px;width:44px;border-radius:8px;vertical-align:middle;margin-right:8px">BOX<span>cric</span> <span style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:4px;margin-left:6px">ADMIN</span></a>
      <nav class="nav" id="mainNav">
        <a href="/admin" class="{% if active == 'home' %}active{% endif %}">Home</a>
        <a href="/admin/matches" class="{% if active == 'matches' %}active{% endif %}">Matches</a>
        <a href="/admin/players" class="{% if active == 'players' %}active{% endif %}">Players</a>
        <a href="/admin/teams" class="{% if active == 'teams' %}active{% endif %}">Teams</a>
        <a href="/admin/records" class="{% if active == 'records' %}active{% endif %}">Records</a>
        <a href="/admin/rankings" class="{% if active == 'rankings' %}active{% endif %}">Rankings</a>
        <a href="/admin/videos" class="{% if active == 'videos' %}active{% endif %}">Videos</a>
        <a href="/admin/users" class="{% if active == 'users' %}active{% endif %}">Users</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode" id="themeBtn">🌙</button>
        <a href="/admin/new-match" class="btn btn-accent btn-sm">+ New Match</a>
      </div>
    </div>
  </header>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Main content -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom Navigation (mobile) -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="/admin" class="bottom-nav-item {% if active == 'home' %}active{% endif %}">
      <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="bottom-nav-label">Home</span>
    </a>
    <a href="/admin/matches" class="bottom-nav-item {% if active == 'matches' %}active{% endif %}">
      <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 12c0-2 1.5-4 4-4s4 2 4 4-1.5 4-4 4-4-2-4-4z"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/></svg></span>
      <span class="bottom-nav-label">Matches</span>
    </a>
    <a href="/admin/new-match" class="bottom-nav-item new-match-fab">
      <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
      <span class="bottom-nav-label">New</span>
    </a>
    <a href="/admin/players" class="bottom-nav-item {% if active == 'players' %}active{% endif %}">
      <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="bottom-nav-label">Players</span>
    </a>
    <a href="/admin/records" class="bottom-nav-item {% if active == 'records' %}active{% endif %}">
      <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 14v4"/></svg></span>
      <span class="bottom-nav-label">Records</span>
    </a>
    <a href="/admin/videos" class="bottom-nav-item {% if active == 'videos' %}active{% endif %}">
      <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></span>
      <span class="bottom-nav-label">Videos</span>
    </a>
  </nav>

  <!-- PWA Install Prompt -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-text">
      <strong>Install BOXcric</strong>
      <span>Add to home screen for the best experience</span>
    </div>
    <button class="btn btn-primary btn-sm" id="installBtn">Install</button>
    <button class="install-dismiss" id="installDismiss">&times;</button>
  </div>

  <script src="/static/js/app.js?v=7"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
